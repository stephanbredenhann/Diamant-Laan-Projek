<div class="map-wrapper">
  <div class="map-container"></div>
  <div class="map-overlay">
    <button class="select-toggle" [class.active]="selectMode" (click)="toggleSelectMode()">
      {{ selectMode ? 'Sleep om te beweeg' : 'Sleep om te kies' }}
    </button>
  </div>
  @if (roadIndicatorVisible) {
    <button
      type="button"
      class="road-indicator"
      (click)="flyToRoad()"
      [style.transform]="'rotate(' + roadIndicatorBearing + 'deg)'"
      title="Kry pad terug"
      aria-label="Navigeer terug na die pad"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  }
</div>
